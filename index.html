<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
<header>
  <h1 class="site-title">~</h1>
  <p class="subtitle">notes on things</p>
</header>

<nav>
  <a href="books.html">books</a>
</nav>

<main>
  <div class="hero">
    <img src="learning_cheems.jpg" alt="A puzzled Cheems" class="intro-img">
    <p class="intro">
      A quiet corner of the internet. Notes on computational biology,
      machine learning, theoretical physics, and whatever else catches my attention.
    </p>
  </div>

  <div id="map"></div>
</main>

<footer>
  <a href="https://github.com/hello-sun-200">github</a>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  var cities = [
    {name: "Hong Kong", lat: 22.3193, lng: 114.1694},
    {name: "placeholder", lat: 39.9042, lng: 116.4074}
  ];

  var map = L.map('map', {
    center: [30, 20],
    zoom: 2,
    scrollWheelZoom: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 12
  }).addTo(map);

  cities.forEach(function(c) {
    L.circleMarker([c.lat, c.lng], {
      radius: 5,
      color: '#d4894a',
      fillColor: '#d4894a',
      fillOpacity: 0.8,
      weight: 1
    }).bindPopup(c.name).addTo(map);
  });
})();
</script>
</body>
</html>
