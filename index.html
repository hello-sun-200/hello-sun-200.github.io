<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
<header>
  <h1 class="site-title">~</h1>
  <p class="subtitle">notes on things</p>
</header>

<nav>
  <a href="books.html">books</a>
</nav>

<main>
  <div class="hero">
    <img src="learning_cheems.jpg" alt="A puzzled Cheems" class="intro-img">
    <p class="intro">
      A quiet corner of the internet. Notes on computational biology,
      machine learning, theoretical physics, and whatever else catches my attention.
    </p>
  </div>

  <div id="map"></div>
</main>

<footer>
  <a href="https://github.com/hello-sun-200">github</a>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  var cities = [
    {name: "Weifang",     lat: 36.71, lng: 119.16},
    {name: "Jinan",       lat: 36.65, lng: 117.12},
    {name: "Qingdao",     lat: 36.07, lng: 120.38},
    {name: "Yantai",      lat: 37.48, lng: 121.44},
    {name: "Linyi",       lat: 35.10, lng: 118.36},
    {name: "Dongying",    lat: 37.43, lng: 118.67},
    {name: "Beijing",     lat: 39.90, lng: 116.41},
    {name: "Tai'an",      lat: 36.20, lng: 117.09},
    {name: "Shenzhen",    lat: 22.54, lng: 114.06},
    {name: "Hong Kong",   lat: 22.32, lng: 114.17},
    {name: "Macau",       lat: 22.20, lng: 113.55},
    {name: "Deyang",      lat: 31.13, lng: 104.40},
    {name: "Chengdu",     lat: 30.57, lng: 104.07},
    {name: "Mianyang",    lat: 31.47, lng: 104.68}
  ];

  var map = L.map('map', {
    center: [31, 113],
    zoom: 5,
    scrollWheelZoom: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 12
  }).addTo(map);

  cities.forEach(function(c) {
    L.circleMarker([c.lat, c.lng], {
      radius: 5,
      color: '#d4894a',
      fillColor: '#d4894a',
      fillOpacity: 0.8,
      weight: 1
    }).bindPopup(c.name).addTo(map);
  });
})();
</script>
</body>
</html>
